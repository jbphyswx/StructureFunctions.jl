name: UpDeps

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update_deps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Install PkgDevTools
        run: julia -e 'using Pkg; Pkg.add("PkgDevTools")'

      - name: Apply UpDeps
        run: |
          julia -e 'using PkgDevTools; PkgDevTools.update_deps("."; auto_all=true)'

      - name: Check Manifest diff
        run: |
          git diff --color=always --exit-code
